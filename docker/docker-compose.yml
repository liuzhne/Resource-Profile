version: '3.8'

services:
  ai-inference-service:
    container_name: ai-inference-service
    build:
      context: ../ai-inference-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - LLM_BASE_URL=http://host.docker.internal:8091/v1
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - LLM_TEMPERATURE=0.3
      - LLM_MAX_TOKENS=2048
    networks:
      - edu-network
    depends_on:
      - milvus-standalone
    restart: unless-stopped

  # 在现有 docker-compose.yml 末尾追加
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - edu-network

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"  # MinIO Console（可选，方便查看对象存储）
      - "9000:9000"  # S3 API
    volumes:
      - ./milvus/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - edu-network

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.1
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # gRPC 端口（Python/Java SDK 连接）
      - "9091:9091"    # RESTful API 端口
    volumes:
      - ./milvus/milvus:/var/lib/milvus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      - etcd
      - minio
    networks:
      - edu-network

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.4
    environment:
      MILVUS_URL: http://milvus-standalone:9091
    ports:
      - "8000:3000"  # Attu Web UI
    depends_on:
      - milvus-standalone
    networks:
      - edu-network
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: edu-portrait-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edu_portrait
      MYSQL_USER: edu
      MYSQL_PASSWORD: edu123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - edu-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: edu-portrait-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edu-network

  # Nacos
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: edu-portrait-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql
    networks:
      - edu-network

  # Gateway
  gateway:
    build:
      context: ../backend/gateway
      dockerfile: ../../docker/Dockerfile.gateway
    container_name: edu-portrait-gateway
    environment:
      NACOS_SERVER: nacos:8848
      NACOS_NAMESPACE:
    ports:
      - "8080:8080"
    depends_on:
      - nacos
    networks:
      - edu-network

volumes:
  mysql_data:
  redis_data:

networks:
  edu-network:
    driver: bridge
