server:
  port: 8087

spring:
  application:
    name: agent-service
    # 替代 bootstrap.yml：直接通过 import 加载 Nacos 配置
  config:
    import:
      - optional:nacos:agent-service.yml?group=DEFAULT_GROUP
      - optional:nacos:common.yml?group=DEFAULT_GROUP
  cloud:
    nacos:
      # 注册中心
      discovery:
        enabled: true
        register-enabled: true
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        identity-key: ${NACOS_AUTH_IDENTITY_KEY:serverIdentity}
        identity-value: ${NACOS_AUTH_IDENTITY_VALUE:security}
        service: ${spring.application.name}

      # 配置中心
      config:
        import-check:
          enabled: false
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        identity-key: ${NACOS_AUTH_IDENTITY_KEY:serverIdentity}
        identity-value: ${NACOS_AUTH_IDENTITY_VALUE:security}
        file-extension: yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/edu_portrait?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:edu}
    password: ${MYSQL_PASSWORD:edu123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0

  ai:
    openai:
      api-key: dummy
      base-url: http://localhost:8091 #http://host.docker.internal:8091
      chat:
        options:
          model: qwen2.5-32b-instruct-q4_k_m
          temperature: 0.3
          max-tokens: 2048

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# 日志
logging:
  level:
    com.edu.agent.mapper: debug

educare:
  prompt:
    risk-analyze: |
      你是一位专业的教育数据分析师，擅长从多维度学生画像数据中识别学业风险信号。
      你拥有严谨的数据分析能力和教育心理学基础。

      ## 分析要求
      1. 基于输入的学生画像数据，识别潜在的学业风险，并给出风险等级判定与根因分析。
      2. 必须基于数据事实进行推理，禁止臆测学生个人私生活。
      3. 如果涉及敏感标签（单亲、留守、经济困难），必须在分析中体现人文关怀视角，但不得作为歧视性判定依据。

      ## 输出格式（严格JSON）
      请严格按照以下 JSON 格式输出，不要添加任何解释性文字：
      {
        "risk_level": "high | medium | low | none",
        "risk_score": 0-100,
        "primary_risk_type": "学业滑坡 | 心理健康预警 | 出勤异常 | 经济困难影响 | 社交孤立 | 综合风险",
        "root_cause_analysis": "基于数据的根因分析，200字以内",
        "key_indicators": ["指标1: 具体数值", "指标2: 具体数值"],
        "recommended_intervention_types": ["学业辅导", "心理疏导", "经济援助", "家校沟通"],
        "urgency_reason": "为什么需要立即干预，100字以内"
      }

      ## 风险等级判定标准
      - high: 多维度同时恶化，或单一维度极度异常（如 GPA 骤降 30%+，或心理健康红色预警）
      - medium: 单一维度明显异常，或其他维度出现轻微恶化信号
      - low: 存在潜在风险信号，但尚未形成明确趋势
      - none: 数据正常，无风险信号