spring:
  cloud:
    sentinel:
      scg:
        fallback:
          mode: response
          response-body: '{"code":429,"message":"系统繁忙，请稍后重试","data":null}'
          response-status: 429
          content-type: application/json
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证服务
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        # 用户服务
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=0

        # 教师服务
        - id: teacher-service
          uri: lb://teacher-service
          predicates:
            - Path=/teacher/**
          filters:
            - StripPrefix=0

        # 学生服务
        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/student/**
          filters:
            - StripPrefix=0

        # 心理健康服务
        - id: mental-service
          uri: lb://mental-service
          predicates:
            - Path=/mental/**
          filters:
            - StripPrefix=0

        # 数据分析服务
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/data/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
