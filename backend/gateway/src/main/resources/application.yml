spring:
  application:
    name: gateway-service
  cloud:
    bootstrap:
      enabled: true
    sentinel:
      scg:
        fallback:
          mode: response
          response-body: '{"code":429,"message":"系统繁忙，请稍后重试","data":null}'
          response-status: 429
          content-type: application/json
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=0
        - id: teacher-service
          uri: lb://teacher-service
          predicates:
            - Path=/teacher/**
          filters:
            - StripPrefix=0
        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/student/**
          filters:
            - StripPrefix=0
        - id: mental-service
          uri: lb://mental-service
          predicates:
            - Path=/mental/**
          filters:
            - StripPrefix=0
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/data/**
          filters:
            - StripPrefix=0
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
