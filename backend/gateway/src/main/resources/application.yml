server:
  port: 8080

spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive

  profiles:
    active: dev

  # Nacos 配置导入
  config:
    import:
      - optional:nacos:gateway-service.yml?group=DEFAULT_GROUP
      - optional:nacos:common.yml?group=DEFAULT_GROUP

  cloud:
    nacos:
      # 注册中心
      discovery:
        enabled: true
        register-enabled: true
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        identity-key: ${NACOS_AUTH_IDENTITY_KEY:serverIdentity}
        identity-value: ${NACOS_AUTH_IDENTITY_VALUE:security}
        service: ${spring.application.name}

      # 配置中心
      config:
        import-check:
          enabled: false
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        identity-key: ${NACOS_AUTH_IDENTITY_KEY:serverIdentity}
        identity-value: ${NACOS_AUTH_IDENTITY_VALUE:security}
        file-extension: yml

    # Gateway 路由配置
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # 引擎服务
        - id: agent-service
          uri: lb://agent-service
          predicates:
            - Path=/agent/**
          filters:
            - StripPrefix=0

        # 认证服务
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        # 用户服务
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=0

        # 教师服务
        - id: teacher-service
          uri: lb://teacher-service
          predicates:
            - Path=/teacher/**
          filters:
            - StripPrefix=0

        # 学生服务
        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/student/**
          filters:
            - StripPrefix=0

        # 心理健康服务
        - id: mental-service
          uri: lb://mental-service
          predicates:
            - Path=/mental/**
          filters:
            - StripPrefix=0

        # 数据分析服务
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/data/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false

logging:
  level:
    org.springframework.cloud.gateway: debug