server:
  port: 8080

spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        identity-key: ${NACOS_AUTH_IDENTITY_KEY:serverIdentity}
        identity-value: ${NACOS_AUTH_IDENTITY_VALUE:security}
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        identity-key: ${NACOS_AUTH_IDENTITY_KEY:serverIdentity}
        identity-value: ${NACOS_AUTH_IDENTITY_VALUE:security}
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            group: DEFAULT_GROUP
            refresh: true

logging:
  level:
    org.springframework.cloud.gateway: debug
